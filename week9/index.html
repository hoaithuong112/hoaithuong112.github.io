<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="site.css">
</head>
<body>
    <div class="form-container">
    <h2>REGISTRATION</h2>
    <hr>
    <div class="row">
        <div class="label">Username:</div>
        <input type="text" class="input-field" name="username">
    </div>
    <div class="row">
        <div class="label">Password:</div>
        <input type="password" class="input-field" name="password">
    </div>
    <div class="row ">
        <div class="label">Re-type<br>Password:</div>
        <input type="password" class="input-field" name="re_password">
    </div>
    <hr>
    <div class="row">
        <div class="label">Birthday:</div>
        <div class="inline-group">
            <select style="padding: 3px;">
                <option>[select one]</option>
                <option value="1">January</option>
                <option value="2" >February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
            <input type="number" class="short-input" name="day" min="1" max="31">    
            <input type="text" class="short-input" name="year" style="width: 70px;">
            <span class="hint">(Month Day, Year)</span>
        </div>
    </div>
    <div class="row">
        <div class="label">Images:</div>
        <input type="file" name="image">
    </div>
    <hr>
    <div class="row">
        <div class="label">First Name:</div>
        <div class="inline-group">
            <input type="text" class="input-field" name="first_name">
            <div class="second-label">Last Name:</div>
            <input type="text" class="input-field" name="last_name">
        </div>
    </div>
    <hr>
    <div class="row ">
        <div class="label" style="width: auto; min-width: 130px;">Interests (optional):</div>
        <div class="interests-container">
            <div class="interests-col">
                <label><input type="checkbox" name="interest" value="Entertainment"> Entertainment</label>
                <label><input type="checkbox" name="interest" value="Home"> Home & Family</label>
                <label><input type="checkbox" name="interest" value="Health"> Health</label>
                <label><input type="checkbox" name="interest" value="Music"> Music</label>
            </div>
            <div class="interests-col" style="margin-left: 50px;">
                <label><input type="checkbox" name="interest" value="Business"> Business</label>
                <label><input type="checkbox" name="interest" value="Tech"> Computers & Technology</label>
                <label><input type="checkbox" name="interest" value="Finance"> Personal Finance</label>
                <label><input type="checkbox" name="interest" value="SmallBusiness"> Small Business</label>
            </div>
        </div>
    </div>
    <hr>
    <div class="submit-container">
        <button type="submit" class="btn-register">REGISTER</button>
    </div>
</div>
</body>
</html>
